paths:
  /posts:
    get:
      tags: [Social]
      summary: Retorna todos os posts
    post:
      tags: [Social]
      summary: Criar novo post
      requestBody:
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/components/schemas/Post'

  /posts/{id}/comments:
    post:
      tags: [Social]
      summary: Adicionar comentário a um post
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/components/schemas/Comment'

  /friends:
    post:
      tags: [Social]
      summary: Gerir pedidos de amizade
      description: Envia pedido (pending) ou aceita (accepted).
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                id_user1: { type: integer }
                id_user2: { type: integer }
                state: { type: string, enum: [pending, accepted] }
