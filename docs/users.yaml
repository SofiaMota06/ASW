paths:
  /users:
    get:
      tags: [Users]
      summary: Listar todos os utilizadores
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: './schemas.yaml#/components/schemas/User'
    post:
      tags: [Users]
      summary: Criar um novo utilizador
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/components/schemas/User'
      responses:
        201:
          description: Utilizador criado com sucesso

  /study-sessions:
    post:
      tags: [Study Sessions]
      summary: Registar uma nova sessão de estudo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas.yaml#/components/schemas/StudySession'
      responses:
        201:
          description: Sessão registada
